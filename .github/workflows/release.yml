name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release tarball
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ARCHIVE_NAME="ec-im-agent-${TAG}"

          # Create a clean tarball with all agent source files
          # Exclude CLAUDE.md — internal development docs, not for public releases
          mkdir -p dist
          tar czf "dist/${ARCHIVE_NAME}.tar.gz" \
            --transform "s,^,${ARCHIVE_NAME}/," \
            --exclude='__pycache__' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            --exclude='*.pyc' \
            --exclude='.env' \
            --exclude='CLAUDE.md' \
            *.py \
            executors/ \
            pyproject.toml \
            uv.lock \
            install.sh

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/checksums.txt
